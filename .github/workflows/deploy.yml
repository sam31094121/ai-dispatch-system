name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies 🔧
        run: npm install
        working-directory: ai-dispatch-system

      - name: Build 🏗️
        run: npm run build
        working-directory: ai-dispatch-system

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ai-dispatch-system/dist
          branch: gh-pages
