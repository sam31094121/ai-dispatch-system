name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # 每次推送到 main 觸發

permissions:
  contents: write # 許可推送至 gh-pages 分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies 🔧
        run: npm install

      - name: Build 🏗️
        run: npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 打包後的資料夾
          branch: gh-pages # 部署到的目標分支
